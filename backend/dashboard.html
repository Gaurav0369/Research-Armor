<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Armor - Policy Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8 h-screen overflow-hidden flex flex-col">
    <div class="max-w-7xl mx-auto w-full h-full flex flex-col">
        
        <div class="flex items-center justify-between mb-2">
            <h1 class="text-3xl font-bold text-gray-800">🛡️ Research Armor</h1>
            <!--span class="px-3 py-1 bg-indigo-100 text-indigo-800 rounded-full text-sm font-semibold">Powered by ArmorIQ</span-->
        </div>
        <p class="text-gray-600 mb-6">Manage live execution policies and monitor agent behavior in real-time.</p>

        <div class="flex-1 grid grid-cols-1 lg:grid-cols-3 gap-6 min-h-0">
            
            <div class="lg:col-span-2 flex flex-col">
                <div class="bg-white rounded-lg shadow overflow-hidden flex-1 flex flex-col">
                    <div class="overflow-y-auto flex-1">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50 sticky top-0">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tool Name</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">MCP Server</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Active Policy</th>
                                </tr>
                            </thead>
                            <tbody id="tools-table" class="bg-white divide-y divide-gray-200">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
            
            <div class="bg-gray-900 rounded-lg shadow flex flex-col overflow-hidden">
                
                <div id="approvals-section" class="hidden bg-gray-800 border-b border-gray-700 p-4">
                    <h3 class="text-sm font-semibold text-yellow-400 mb-3 flex items-center gap-2">
                        <span class="relative flex h-3 w-3">
                          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75"></span>
                          <span class="relative inline-flex rounded-full h-3 w-3 bg-yellow-500"></span>
                        </span>
                        Pending Approvals
                    </h3>
                    <div id="approvals-list" class="space-y-2 max-h-48 overflow-y-auto">
                        </div>
                </div>

                <div class="px-4 py-3 bg-gray-800 border-b border-gray-700 flex justify-between items-center">
                    <h3 class="text-sm font-semibold text-gray-200">Terminal: Live Audit Logs</h3>
                    <span class="flex h-3 w-3 relative">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                    </span>
                </div>
                
                <div id="logs-container" class="p-4 overflow-y-auto flex-1 font-mono text-xs text-gray-300 space-y-3">
                    <div class="text-gray-500 italic">Waiting for agent activity...</div>
                </div>

                <div class="p-4 bg-gray-800 border-t border-gray-700">
                    <form onsubmit="sendMessage(event)" class="flex gap-2">
                        <input type="text" id="chat-input" class="flex-1 bg-gray-700 text-white rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500 border border-gray-600" placeholder="Ask agent to do something..." autocomplete="off">
                        <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded text-sm font-semibold transition-colors shadow-sm">Send</button>
                    </form>
                </div>
            </div>

        </div>
        
        <div id="toast" class="fixed bottom-4 right-4 hidden p-4 bg-green-100 text-green-700 rounded-lg shadow-lg transition-opacity duration-300">
            Policy updated successfully!
        </div>
    </div>

    <script>
        let lastLogCount = 0;

        async function loadDashboard() {
            const toolsRes = await fetch('/api/tools');
            const tools = await toolsRes.json();
            const policyRes = await fetch('/api/policy');
            const policies = await policyRes.json();

            const tbody = document.getElementById('tools-table');
            tbody.innerHTML = '';

            tools.forEach(tool => {
                const currentPolicy = policies[tool.name] || 'allow';
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${tool.name}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-blue-100 text-blue-800">
                            ${tool.server}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm">
                        <select onchange="updatePolicy('${tool.name}', this.value)" 
                                class="mt-1 block w-full py-2 px-3 border border-gray-300 bg-white rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                            <option value="allow" ${currentPolicy === 'allow' ? 'selected' : ''}>✅ Allow</option>
                            <option value="approval" ${currentPolicy === 'approval' ? 'selected' : ''}>⏳ Require Approval</option>
                            <option value="block" ${currentPolicy === 'block' ? 'selected' : ''}>🚫 Block</option>
                        </select>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function updatePolicy(toolName, decision) {
            await fetch(`/api/policy/${toolName}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ decision })
            });
            const toast = document.getElementById('toast');
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2000);
        }

        async function fetchApprovals() {
            try {
                const res = await fetch('/api/approvals');
                const approvals = await res.json();
                
                const section = document.getElementById('approvals-section');
                const list = document.getElementById('approvals-list');
                
                if (approvals.length === 0) {
                    section.classList.add('hidden');
                    return;
                }
                
                section.classList.remove('hidden');
                let html = '';
                approvals.forEach(req => {
                    html += `
                        <div class="bg-gray-700 rounded p-3 text-sm border border-gray-600 shadow-sm">
                            <div class="text-white font-semibold flex justify-between">
                                <span>Tool: <span class="text-blue-300">${req.tool_name}</span></span>
                                <span class="text-gray-400 text-xs">${req.timestamp}</span>
                            </div>
                            <div class="text-gray-300 text-xs mt-1 mb-3 font-mono bg-gray-900 p-2 rounded">Args: ${JSON.stringify(req.arguments)}</div>
                            <div class="flex gap-2">
                                <button onclick="resolveApproval('${req.id}', true)" class="bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded text-xs font-bold w-full transition-colors">✅ Approve</button>
                                <button onclick="resolveApproval('${req.id}', false)" class="bg-red-600 hover:bg-red-700 text-white px-3 py-1.5 rounded text-xs font-bold w-full transition-colors">🚫 Reject</button>
                            </div>
                        </div>
                    `;
                });
                list.innerHTML = html;
            } catch (e) {
                console.error("Failed to fetch approvals");
            }
        }

        async function resolveApproval(reqId, approved) {
            await fetch(`/api/approvals/${reqId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ approved })
            });
            // Force quick refresh
            fetchApprovals();
            fetchLogs();
        }

        async function fetchLogs() {
            try {
                const res = await fetch('/api/logs');
                const logs = await res.json();
                
                if (logs.length === lastLogCount) return; // Skip if no new logs
                lastLogCount = logs.length;

                const container = document.getElementById('logs-container');
                let html = '';
                
                logs.forEach(log => {
                    let colorClass = 'text-gray-300';
                    let bgClass = '';
                    
                    if (log.type === 'user') colorClass = 'text-blue-400';
                    if (log.type === 'agent') colorClass = 'text-green-400';
                    if (log.type === 'policy') {
                        colorClass = log.details.decision === 'block' ? 'text-red-400' : 'text-yellow-400';
                        if (log.details.decision === 'allow') colorClass = 'text-green-400';
                        if (log.details.decision === 'pending') colorClass = 'text-yellow-400';
                        bgClass = 'bg-gray-800 p-2 rounded mt-1 border border-gray-700';
                    }
                    
                    html += `<div class="mb-3 leading-relaxed">`;
                    html += `<span class="text-gray-500">[${log.timestamp}]</span> `;
                    
                    if (log.type === 'policy') {
                        let icon = '🛡️';
                        if (log.details.decision === 'block') icon = '🛑';
                        if (log.details.decision === 'pending') icon = '⏳';
                        if (log.details.decision === 'allow') icon = '✅';
                        
                        html += `<span class="font-bold ${colorClass}">${icon} GUARDRAIL:</span> <span class="text-gray-300">${log.message}</span>`;
                        html += `<div class="${bgClass} text-[11px] overflow-x-auto text-gray-400 whitespace-pre-wrap mt-1"><b>Action:</b> ${log.details.decision.toUpperCase()}<br/><b>Args:</b> ${JSON.stringify(log.details.arguments)}</div>`;
                    } else {
                        const prefix = log.type === 'user' ? '👤 User:' : '🤖 Agent:';
                        html += `<span class="font-bold ${colorClass}">${prefix}</span> <span class="text-gray-200">${log.message}</span>`;
                    }
                    html += `</div>`;
                });
                
                container.innerHTML = html;
                container.scrollTop = container.scrollHeight;
            } catch (e) {
                console.error("Failed to fetch logs");
            }
        }

        async function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message) return;
            
            input.value = '';
            
            // Disable button briefly
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerHTML = '...';

            try {
                // Background request - the logs will update naturally
                fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                }).finally(() => {
                    btn.disabled = false;
                    btn.innerHTML = 'Send';
                });
                // Instantly refresh logs on send
                fetchLogs(); 
            } catch (err) {
                console.error(err);
            }
        }

        // Initialize and setup polling
        loadDashboard();
        setInterval(() => {
            fetchLogs();
            fetchApprovals();
        }, 1500); 
    </script>

    <div class="bg-gray-800 text-white p-3 rounded-lg mb-4 flex items-center justify-between">
        <span class="text-xs font-bold text-indigo-400 uppercase">Token Budget</span>
        <span id="token-display" class="font-mono text-sm">0 tokens</span>
    </div>

    <script>
        // Add this to your existing <script> section
        async function updateTokens() {
            // You would need to add a quick GET /api/tokens endpoint in app.py that returns store.get_total_tokens()
            const res = await fetch('/api/tokens');
            const data = await res.json();
            document.getElementById('token-display').innerText = data.total + " tokens used";
        }
        setInterval(updateTokens, 2000);
    </script>
</body>
</html>
